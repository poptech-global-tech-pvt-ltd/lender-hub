env: "local"

# For PATCH order status (support override) — use env LENDING_HUB_INTERNAL_API_TOKEN in prod
internal_api_token: "internal-token-local"

http:
  port: "8080"
  read_timeout: 30s
  write_timeout: 30s
  shutdown_timeout: 10s

db:
  host: "localhost"
  port: 3307
  user: "common_stage"
  password: "popstage2020"
  name: "lender_hub"
  sslmode: "disable"
  max_open_conns: 50
  max_idle_conns: 10
  conn_max_lifetime: 300s
  conn_max_idle_time: 120s



redis:
  addr: "localhost:6379"
  password: ""
  db: 0
  dial_timeout: 5s
  read_timeout: 3s
  write_timeout: 3s

kafka:
  enabled: false
  brokers:
    - "localhost:9092"
  topics:
    orderCreated: "lsp.order.created"
    orderStatusUpdated: "lsp.order.status_updated"
    orderSupportUpdated: "lsp.order.support_updated"
    refundCreated: "lsp.refund.created"
    refundStatusUpdated: "lsp.refund.status_updated"
    orderCallback: "lsp.lazypay.order.callback"
    refundCallback: "lsp.lazypay.refund.callback"
    orderCallbackDlq: "lsp.lazypay.order.callback.dlq"
    refundCallbackDlq: "lsp.lazypay.refund.callback.dlq"
  consumerGroups:
    orderCallback: "lending-hub.order-callback"
    refundCallback: "lending-hub.refund-callback"
  producer:
    writeTimeoutSeconds: 10
    batchSize: 1
    requiredAcks: -1
  consumer:
    minBytes: 1
    maxBytes: 10485760
    maxWaitSeconds: 3
    commitIntervalMs: 1000
    maxRetries: 3
    retryBackoffMs: 500

userProfileService:
  baseURL: "https://userprofile-sit.popclub.co.in"
  timeout: "5s"

lazypay:
  base_url: "https://sboxapi.lazypay.in"
  access_key: "CO4KGG9DJEDZI3J04NNO"
  secret_key: "49165512a4d220c580175223711c49dc68ab7cdf"
  merchant_id: "270"  # Optional - leave empty if you only have subMerchantId
  sub_merchant_id: "270"  # Replace with your actual subMerchantId
  return_url: "https://github.com/poptech-global-tech-pvt-ltd/pop-sherlock/pull/70"  # Callback URL for redirects
  profile_timeout: 10s
  payment_timeout: 5s
  enabled: true



